<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SendPulse Design Prototypes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://login.sendpulse.com/dist/css/bootstrap.min.css" rel="stylesheet" media="screen">
    <link href="https://login.sendpulse.com/dist/css/template.min.css" rel="stylesheet" media="screen">
    <style>
        body {
            padding: 40px;
            background: #f5f8fa;
        }

        .prototype-index {
            max-width: 920px;
            margin: 0 auto;
        }

        .prototype-card {
            display: block;
            padding: 20px;
            margin-top: 16px;
            border-radius: 8px;
            background: #fff;
            color: #023346;
            text-decoration: none;
            box-shadow: 0 1px 3px rgba(2, 51, 70, .08);
        }

        .prototype-card:hover,
        .prototype-card:focus {
            color: #023346;
            text-decoration: none;
            box-shadow: 0 4px 14px rgba(2, 51, 70, .12);
        }

        .prototype-card h2 {
            margin: 0 0 8px;
            font-size: 20px;
        }

        .prototype-card p {
            margin: 0;
            color: #465152;
        }
    </style>
</head>
<body class="sp">
    <main class="prototype-index">
        <h1>SendPulse Design Prototypes</h1>
        <p class="text-muted">Static HTML prototypes grouped by task folder.</p>

        <a class="prototype-card" href="CRM_History-Event-Page/">
            <h2>CRM_History-Event-Page</h2>
            <p>CRM / Analytics / Event history page prototype.</p>
        </a>

        <a class="prototype-card" href="Horizontal-scroll/">
            <h2>Horizontal-scroll</h2>
            <p>CRM drawer prototype with horizontal status bubble scrolling.</p>
        </a>
    </main>
</body>
</html>
